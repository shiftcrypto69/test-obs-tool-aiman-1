<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="utf-8">
    <title>OBS Source - Vertical 10 Channels</title>
    
    <link rel="stylesheet" href="common/css/style-control_panel.css">
    <link rel="stylesheet" href="common/css/style-source.css">
    
    <script src="common/js/jquery.js"></script>

    <style>
        /* Memastikan canvas lutsinar dan saiz penuh OBS */
        body {
            background-color: transparent !important;
            overflow: hidden;
            width: 1920px;
            height: 1080px;
            margin: 0;
            padding: 0;
        }

        #display-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* KEDUDUKAN: Kiri Atas (Top Left) secara menegak */
        .alt {
            position: absolute;
            left: 20px; /* Jarak dari kiri */
            transition: all 0.5s ease-in-out;
        }

        /* Susunan 1-10 dari Atas ke Bawah */
        #lower-third-1  { top: 20px; }
        #lower-third-2  { top: 110px; }
        #lower-third-3  { top: 200px; }
        #lower-third-4  { top: 290px; }
        #lower-third-5  { top: 380px; }
        #lower-third-6  { top: 470px; }
        #lower-third-7  { top: 560px; }
        #lower-third-8  { top: 650px; }
        #lower-third-9  { top: 740px; }
        #lower-third-10 { top: 830px; }

        /* Masking untuk kesan teks muncul */
        .text-mask {
            overflow: hidden;
            display: block;
        }

        /* Saiz teks yang disesuaikan untuk susunan rapat */
        .text-content {
            padding: 5px 15px !important;
        }
    </style>
</head>
<body class="browser-source">
    <div id="display-container"></div>

    <script>
        const bcp = new BroadcastChannel('obs-lower-thirds-channel');

        // Jana 10 bekas Lower Third secara dinamik
        for (let i = 1; i <= 10; i++) {
            $('#display-container').append(`
                <div id="lower-third-${i}" class="alt left style-1 hide-anim" style="display:none;">
                    <div class="graph-1"></div> 
                    <div class="text-content">
                        <div class="text-mask">
                            <div id="alt-${i}-name" style="font-weight:bold; font-size:1.8em;"></div>
                        </div>
                        <div class="text-mask">
                            <div id="alt-${i}-info" style="font-size:1.1em; color: #eee;"></div>
                        </div>
                    </div>
                    <div class="graph-2"></div>
                </div>
            `);
        }

        // Mendengar mesej daripada Sleek Control Panel (index.html)
        bcp.onmessage = function(ev) {
            const data = ev.data;
            const target = $(`#lower-third-${data.id}`);
            const nameEl = $(`#alt-${data.id}-name`);
            const infoEl = $(`#alt-${data.id}-info`);

            if (data.switch) {
                // Masukkan teks
                nameEl.text(data.name);
                infoEl.text(data.info);

                // Tampilkan & Animasi Masuk
                target.show();
                setTimeout(() => {
                    target.removeClass('hide-anim').addClass('animation-in');
                }, 50);
                
                console.log(`LT #${data.id} ON`);
            } else {
                // Animasi Keluar
                target.addClass('hide-anim').removeClass('animation-in');
                
                // Sembunyikan selepas animasi tamat
                setTimeout(function() {
                    if (target.hasClass('hide-anim')) {
                        target.hide();
                    }
                }, 500);
                
                console.log(`LT #${data.id} OFF`);
            }
        };
    </script>
</body>
</html>
