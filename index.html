<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10x10 Lower Thirds Control Panel</title>
    
    <link rel="stylesheet" href="common/css/style-control_panel.css">
    
    <script src="common/js/jquery.js"></script>

    <style>
        /* Styling tambahan untuk memastikan panel nampak profesional & tersusun */
        body.panel {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        h1 {
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            color: #007bff;
            text-align: center;
        }

        #container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .lt-section { 
            border: 1px solid #444; 
            padding: 15px; 
            background: #252525; 
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .lt-section h3 { 
            margin-top: 0; 
            color: #ffc107; 
            font-size: 1.1em;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }

        .slot-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 5px; 
            margin: 10px 0;
        }

        .slot-btn { 
            padding: 8px 0; 
            cursor: pointer; 
            background: #444; 
            color: white; 
            border: none; 
            border-radius: 4px;
            font-size: 11px;
            transition: 0.2s;
        }

        .slot-btn.active { background: #007bff; font-weight: bold; }
        .slot-btn:hover { background: #666; }
        
        input { 
            width: calc(100% - 20px); 
            margin-bottom: 8px; 
            padding: 10px;
            background: #333; 
            color: white; 
            border: 1px solid #555; 
            border-radius: 4px;
            display: block;
        }
        
        .control-btns { display: flex; gap: 10px; margin-top: 10px; }
        .btn-on { background: #28a745; color: white; border: none; padding: 12px; flex: 1; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-off { background: #dc3545; color: white; border: none; padding: 12px; flex: 1; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-on:hover { background: #218838; }
        .btn-off:hover { background: #c82333; }
    </style>
</head>
<body class="panel">
    <h1>CONTROL PANEL (10 LT x 10 SLOTS)</h1>
    <div id="container"></div>

    <script>
        const bcp = new BroadcastChannel('obs-lower-thirds-channel');

        // Jana 10 Seksyen Lower Third secara automatik
        for (let i = 1; i <= 10; i++) {
            $('#container').append(`
                <div class="lt-section" id="section-${i}">
                    <h3>LOWER THIRD #${i}</h3>
                    <input type="text" id="alt-${i}-name" placeholder="Masukkan Nama...">
                    <input type="text" id="alt-${i}-info" placeholder="Masukkan Info/Jawatan...">
                    
                    <div class="slot-grid" id="slots-${i}">
                        </div>
                    
                    <div class="control-btns">
                        <button class="btn-on" onclick="toggleLT(${i}, true)">ON</button>
                        <button class="btn-off" onclick="toggleLT(${i}, false)">OFF</button>
                    </div>
                </div>
            `);

            // Jana 10 Slot memori untuk setiap Lower Third
            for (let s = 1; s <= 10; s++) {
                $(`#slots-${i}`).append(`
                    <button class="slot-btn" id="btn-lt-${i}-s-${s}" onclick="handleSlotClick(${i}, ${s})">S${s}</button>
                `);
            }
        }

        /**
         * Logik Slot Memori:
         * 1. Jika input kosong, ia akan LOAD data dari slot.
         * 2. Jika input ada teks, ia akan SAVE data ke slot.
         */
        function handleSlotClick(ltId, slotId) {
            const nameField = $(`#alt-${ltId}-name`);
            const infoField = $(`#alt-${ltId}-info`);
            const storageKey = `lt-${ltId}-slot-${slotId}`;
            
            const savedData = localStorage.getItem(storageKey);

            if (nameField.val() === "" && savedData) {
                // LOAD DATA
                const data = JSON.parse(savedData);
                nameField.val(data.name);
                infoField.val(data.info);
                console.log(`LT ${ltId} Slot ${slotId} dimuatkan.`);
            } else {
                // SAVE DATA
                const dataToSave = {
                    name: nameField.val(),
                    info: infoField.val()
                };
                localStorage.setItem(storageKey, JSON.stringify(dataToSave));
                $(`#btn-lt-${ltId}-s-${slotId}`).addClass('active');
                console.log(`LT ${ltId} Slot ${slotId} disimpan.`);
            }
        }

        /**
         * Menghantar data ke browser-source.html melalui BroadcastChannel
         */
        function toggleLT(id, status) {
            const data = {
                id: id,
                name: $(`#alt-${id}-name`).val(),
                info: $(`#alt-${id}-info`).val(),
                switch: status
            };
            bcp.postMessage(data);
            console.log(`LT ${id} dihantar: ${status ? 'ON' : 'OFF'}`);
        }

        // Semak data sedia ada dalam LocalStorage semasa mula (Highlight butang slot yang berisi)
        $(document).ready(function() {
            for (let i = 1; i <= 10; i++) {
                for (let s = 1; s <= 10; s++) {
                    if (localStorage.getItem(`lt-${i}-slot-${s}`)) {
                        $(`#btn-lt-${i}-s-${s}`).addClass('active');
                    }
                }
            }
        });
    </script>
</body>
</html>
