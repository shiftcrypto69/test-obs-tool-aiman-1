<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="utf-8">
    <title>Sleek OBS Control Panel</title>
    <link rel="stylesheet" href="common/css/style-control_panel.css">
    <script src="common/js/jquery.js"></script>

    <style>
        body.panel {
            background-color: #121212;
            color: #efefef;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 10px;
        }

        h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #007bff;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        /* Layout Menegak */
        #container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 300px; /* Lebar sesuai untuk dock kiri OBS */
        }

        .lt-row {
            background: #1e1e1e;
            border-radius: 6px;
            padding: 10px;
            border: 1px solid #2a2a2a;
        }

        .lt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .lt-title {
            font-size: 12px;
            font-weight: bold;
            color: #888;
        }

        /* Input Ringkas */
        input {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: white;
            padding: 6px;
            font-size: 12px;
            border-radius: 4px;
            margin-bottom: 4px;
            box-sizing: border-box;
        }

        /* Slot Buttons Kompak */
        .slot-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            margin-bottom: 8px;
        }

        .slot-btn {
            background: #333;
            border: none;
            color: #aaa;
            font-size: 9px;
            padding: 4px 0;
            border-radius: 3px;
            cursor: pointer;
        }

        .slot-btn.active {
            background: #444;
            color: #007bff;
            border: 1px solid #007bff;
        }

        /* Toggle Switch Moden */
        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 18px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #444;
            transition: .3s;
            border-radius: 18px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 2px; bottom: 2px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #28a745; }
        input:checked + .slider:before { transform: translateX(16px); }

    </style>
</head>
<body class="panel">
    <h2>LT Control</h2>
    <div id="container"></div>

    <script>
        const bcp = new BroadcastChannel('obs-lower-thirds-channel');

        for (let i = 1; i <= 10; i++) {
            $('#container').append(`
                <div class="lt-row">
                    <div class="lt-header">
                        <span class="lt-title">LT #${i}</span>
                        <label class="switch">
                            <input type="checkbox" id="toggle-${i}" onchange="sendToggle(${i})">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <input type="text" id="alt-${i}-name" placeholder="Nama">
                    <input type="text" id="alt-${i}-info" placeholder="Info">
                    <div class="slot-grid" id="slots-${i}"></div>
                </div>
            `);

            for (let s = 1; s <= 10; s++) {
                $(`#slots-${i}`).append(`
                    <button class="slot-btn" id="btn-lt-${i}-s-${s}" onclick="handleSlot(${i}, ${s})">S${s}</button>
                `);
            }
        }

        function handleSlot(ltId, slotId) {
            const n = $(`#alt-${ltId}-name`);
            const f = $(`#alt-${ltId}-info`);
            const key = `lt-${ltId}-s-${slotId}`;
            const saved = localStorage.getItem(key);

            if (n.val() === "" && saved) {
                const data = JSON.parse(saved);
                n.val(data.name); f.val(data.info);
            } else {
                localStorage.setItem(key, JSON.stringify({name: n.val(), info: f.val()}));
                $(`#btn-lt-${ltId}-s-${slotId}`).addClass('active');
            }
        }

        function sendToggle(id) {
            const isChecked = $(`#toggle-${id}`).is(':checked');
            bcp.postMessage({
                id: id,
                name: $(`#alt-${id}-name`).val(),
                info: $(`#alt-${id}-info`).val(),
                switch: isChecked
            });
        }

        $(document).ready(function() {
            for (let i = 1; i <= 10; i++) {
                for (let s = 1; s <= 10; s++) {
                    if (localStorage.getItem(`lt-${i}-s-${s}`)) $(`#btn-lt-${i}-s-${s}`).addClass('active');
                }
            }
        });
    </script>
</body>
</html>
