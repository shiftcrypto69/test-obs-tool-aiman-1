<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="utf-8">
    <title>Lower Thirds Source - 10 Channels</title>
    
    <link rel="stylesheet" href="common/css/style-control_panel.css">
    <link rel="stylesheet" href="common/css/style-source.css">
    
    <script src="common/js/jquery.js"></script>

    <style>
        /* Memastikan canvas adalah lutsinar dan mengikut saiz OBS */
        body {
            background-color: transparent !important;
            overflow: hidden;
            width: 1920px;
            height: 1080px;
            margin: 0;
            padding: 0;
        }

        #display-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Kedudukan setiap LT supaya tersusun secara menegak */
        .alt {
            position: absolute;
            left: 50px;
            transition: all 0.5s ease-in-out;
        }

        /* Susunan 10 Lower Third dari bawah ke atas */
        #lower-third-1  { bottom: 50px; }
        #lower-third-2  { bottom: 140px; }
        #lower-third-3  { bottom: 230px; }
        #lower-third-4  { bottom: 320px; }
        #lower-third-5  { bottom: 410px; }
        #lower-third-6  { bottom: 500px; }
        #lower-third-7  { bottom: 590px; }
        #lower-third-8  { bottom: 680px; }
        #lower-third-9  { bottom: 770px; }
        #lower-third-10 { bottom: 860px; }

        /* Memastikan text-mask berfungsi untuk kesan "teks muncul" */
        .text-mask {
            overflow: hidden;
            display: block;
        }
    </style>
</head>
<body class="browser-source">
    <div id="display-container"></div>

    <script>
        const bcp = new BroadcastChannel('obs-lower-thirds-channel');

        // Jana 10 bekas Lower Third (Mengikut struktur HTML v1.6)
        for (let i = 1; i <= 10; i++) {
            $('#display-container').append(`
                <div id="lower-third-${i}" class="alt left style-1 hide-anim" style="display:none;">
                    <div class="graph-1"></div> <div class="text-content">
                        <div class="text-mask">
                            <div id="alt-${i}-name"></div>
                        </div>
                        <div class="text-mask">
                            <div id="alt-${i}-info"></div>
                        </div>
                    </div>
                    <div class="graph-2"></div>
                </div>
            `);
        }

        // Mendengar arahan dari index.html
        bcp.onmessage = function(ev) {
            const data = ev.data;
            const target = $(`#lower-third-${data.id}`);
            const nameEl = $(`#alt-${data.id}-name`);
            const infoEl = $(`#alt-${data.id}-info`);

            if (data.switch) {
                // Masukkan teks baru
                nameEl.text(data.name);
                infoEl.text(data.info);

                // Jalankan animasi masuk
                target.show();
                setTimeout(() => {
                    target.removeClass('hide-anim').addClass('animation-in');
                }, 10);
                
                console.log(`LT ${data.id} is now ON`);
            } else {
                // Jalankan animasi keluar
                target.addClass('hide-anim').removeClass('animation-in');
                
                // Sembunyikan elemen selepas animasi tamat (0.5s)
                setTimeout(() => {
                    if (target.hasClass('hide-anim')) {
                        target.hide();
                    }
                }, 500);
                
                console.log(`LT ${data.id} is now OFF`);
            }
        };
    </script>
</body>
</html>
